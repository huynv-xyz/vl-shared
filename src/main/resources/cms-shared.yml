micronaut:
  http:
    services:
      ai-news:
        url: ${ai-news.base-url}
        read-timeout: 120s
        connect-timeout: 10s
        idle-timeout: 120s

datasources:
  default:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:vcms}
    driverClassName: ${POSTGRES_DRIVER_CLASS_NAME:org.postgresql.Driver}
    username: ${POSTGRES_USERNAME:admin}
    password: ${POSTGRES_PASSWORD:admin123}
    db-type: postgres
    schema-generate: NONE
    dialect: POSTGRES

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        show_sql: true

v-app:
  cdn:
    url: "${CDN_URL:`https://cdn.v-app.vn`}"

identity-provider-query:
  base-url: "${IDENTITY_CLIENT:`http://identity-provider-query.iam`}"

ai-news:
  base-url: "${HTTP_AI_NEWS_URL:`http://ai-news-api-2076195197.ap-southeast-1.elb.amazonaws.com`}"
  auth:
    username: "${HTTP_AI_NEWS_USERNAME:user_6b73a539}"
    password: "${HTTP_AI_NEWS_PASSWORD:AFX18rpNjjYAvojDaoJTag}"

upload:
  url: "http://uploader.iam"